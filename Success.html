<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Successful – HY Analysts Terminal</title>
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <style>
        body {
            background: #050505;
            color: #22ab94;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        button {
            background: #22ab94;
            border: none;
            padding: 10px 20px;
            margin-top: 20px;
            font-family: monospace;
            font-weight: bold;

<body>
    <h1>✅ Payment successful!</h1>
    <p>Your support unlocks the map supply chain buttons.</p>
    <button onclick="goToTerminal()">Go to Terminal →</button>

        // Save flag that payment was completed
        localStorage.setItem('terminal_access_granted', 'true');

        function goToTerminal() {
            window.location.href = '/';  // or 'index.html'
        }
    </script>
