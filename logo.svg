<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HYA Logo – Save as PNG</title>
    <style>
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        .logo-container {
            background: #050505;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid #333;
            margin-bottom: 30px;
        }
        button {
            background: #22ab94;
            border: none;
            color: black;
            font-size: 16px;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background: #ff8800;
        }
        p {
            color: #ccc;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="logo-container">
    <!-- The logo rendered at 512x512 (enough for YouTube) -->
    <svg width="512" height="512" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="hy_grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#22ab94" />
                <stop offset="100%" stop-color="#ff8800" />
            </linearGradient>
        </defs>
        <!-- H -->
        <line x1="22" y1="18" x2="22" y2="82" stroke="url(#hy_grad)" stroke-width="9" stroke-linecap="round" />
        <line x1="78" y1="18" x2="78" y2="82" stroke="url(#hy_grad)" stroke-width="9" stroke-linecap="round" />
        <line x1="22" y1="50" x2="78" y2="50" stroke="url(#hy_grad)" stroke-width="9" stroke-linecap="round" />
        <!-- Y -->
        <line x1="50" y1="50" x2="50" y2="82" stroke="url(#hy_grad)" stroke-width="8" stroke-linecap="round" />
        <line x1="50" y1="50" x2="28" y2="18" stroke="url(#hy_grad)" stroke-width="8" stroke-linecap="round" />
        <line x1="50" y1="50" x2="72" y2="18" stroke="url(#hy_grad)" stroke-width="8" stroke-linecap="round" />
        <!-- A -->
        <line x1="18" y1="75" x2="50" y2="22" stroke="url(#hy_grad)" stroke-width="7" stroke-linecap="round" />
        <line x1="82" y1="75" x2="50" y2="22" stroke="url(#hy_grad)" stroke-width="7" stroke-linecap="round" />
        <line x1="32" y1="52" x2="68" y2="52" stroke="url(#hy_grad)" stroke-width="7" stroke-linecap="round" />
    </svg>
</div>
<button id="downloadBtn">📥 Download as PNG (512x512)</button>
<p>Right‑click the logo above and choose "Save image as..." → PNG, or click the button.</p>

<script>
    document.getElementById('downloadBtn').addEventListener('click', function() {
        // Get the SVG element
        const svg = document.querySelector('.logo-container svg');
        // Create a canvas element
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        // Set background colour (optional – YouTube likes transparency, but we'll keep dark)
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        // Convert SVG to an image
        const svgData = new XMLSerializer().serializeToString(svg);
        const img = new Image();
        img.onload = function() {
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            // Create download link
            const a = document.createElement('a');
            a.href = canvas.toDataURL('image/png');
            a.download = 'hya-logo-512.png';
            a.click();
        };
        img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgData);
    });
</script>
</body>
</html>
