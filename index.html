<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYA | Precision Logistics Terminal</title>
    <!-- Core Dependencies (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --terminal-dark: #050505; --bloomberg-orange: #ff8800; }
        body { background: var(--terminal-dark); color: #e5e5e5; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .glass-card { background: rgba(10, 10, 10, 0.85); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        
        /* Map Customization */
        #map { height: 100%; width: 100%; background: #0a0a0a; border-radius: 8px; }
        .leaflet-container { background: #050505 !important; }
        
        /* Custom Scrollbar for Terminal Feeds */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        
        .pulse-icon { animation: shadow-pulse 2s infinite; }
        @keyframes shadow-pulse { 0% { filter: drop-shadow(0 0 2px #ff8800); } 100% { filter: drop-shadow(0 0 8px #ff8800); } }
    </style>
</head>
<body class="h-screen p-3 flex flex-col gap-3">

    <!-- HEADER -->
    <header class="flex justify-between items-center glass-card p-3 rounded-lg border-b border-orange-500/30 shrink-0">
        <div class="flex items-center gap-4">
            <h1 class="text-lg font-bold tracking-tighter text-[#ff8800]">HYA PRECISION TERMINAL</h1>
            <div class="flex gap-4 text-[9px] font-bold text-gray-500 border-l border-white/10 pl-4">
                <span>GEO_SYNC: <span class="text-emerald-500 font-bold">100%</span></span>
                <span>DATA_STREAM: <span class="text-blue-500 font-bold">ACTIVE</span></span>
            </div>
        </div>
        <div class="text-[9px] font-bold text-gray-600 uppercase tracking-widest">
            Node: Eastpointe_MI_48021
        </div>
    </header>

    <!-- MAIN INTERFACE -->
    <main class="flex-grow grid grid-cols-12 gap-3 overflow-hidden">
        
        <!-- LEFT: SCROLLABLE SHIPMENT REPOSITORY -->
        <aside class="col-span-3 flex flex-col gap-3 overflow-hidden">
            <div class="glass-card rounded-lg p-4 flex-grow flex flex-col overflow-hidden">
                <h2 class="text-xs font-bold text-gray-400 uppercase mb-4 flex items-center justify-between">
                    <span>Commodity Registry</span>
                    <i data-lucide="database" class="w-3 h-3"></i>
                </h2>
                <!-- SCROLLABLE FEED -->
                <div id="shipment-feed" class="flex-grow overflow-y-auto custom-scroll space-y-2 pr-2">
                    <!-- Cards Injected by JS -->
                </div>
            </div>

            <!-- SYSTEM LOG -->
            <div class="glass-card rounded-lg p-3 h-32 text-[9px] text-gray-500 font-bold">
                <div class="flex items-center gap-2 text-orange-500 mb-2">
                    <i data-lucide="terminal" class="w-3 h-3"></i>
                    <span>INTELLIGENCE_LAYER</span>
                </div>
                <p id="typewriter" class="italic leading-relaxed">Mapping real-time supply chain topology...</p>
            </div>
        </aside>

        <!-- RIGHT: INTERACTIVE ACCURATE MAP -->
        <section class="col-span-9 glass-card rounded-lg p-1 relative">
            <div id="map"></div>
            
            <!-- OVERLAY TOOLS -->
            <div class="absolute top-4 right-4 z-[1000] flex flex-col gap-2">
                <button onclick="flyToHub('US')" class="glass-card p-2 rounded hover:bg-white/5 text-[8px] font-bold uppercase">Focus: SPY Hub</button>
                <button onclick="flyToHub('Global')" class="glass-card p-2 rounded hover:bg-white/5 text-[8px] font-bold uppercase">Reset View</button>
            </div>
        </section>
    </main>

    <!-- FOOTER -->
    <footer class="flex justify-between items-center text-[9px] text-gray-600 font-bold px-2 uppercase shrink-0">
        <div class="flex gap-4">
            <span>Silo: Operational</span>
            <span>Uptime: 100%</span>
        </div>
        <div class="text-emerald-500">
            Phase A-E Systems Verified
        </div>
    </footer>

    <script>
        lucide.createIcons();

        // 1. Initialize Map (Border Accurate)
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView([20, 0], 2);

        // Dark Matter Tiles (Clean & Accurate)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        // 2. Shipment Data
        const shipments = [
            { id: 'FE-MI', name: 'Iron Ore', start: [-23.5, -46.6], end: [42.3, -83.0], status: 'Transit' },
            { id: 'LI-CH', name: 'Lithium', start: [-23.5, -70.4], end: [31.2, 121.4], status: 'Priority' },
            { id: 'OIL-ER', name: 'Crude Oil', start: [26.2, 50.1], end: [51.5, 0.12], status: 'Loading' },
            { id: 'AG-BR', name: 'Grain Bulk', start: [44.8, -93.2], end: [34.0, 118.2], status: 'Transit' },
            { id: 'X-7928', name: 'Semiconductors', start: [25.0, 121.5], end: [42.4, -83.0], status: 'En Route' }
        ];

        // 3. Render Shipment Feed (Scrolling enabled via CSS)
        const feed = document.getElementById('shipment-feed');
        shipments.forEach(s => {
            const card = document.createElement('div');
            card.className = 'p-3 border border-white/5 bg-white/5 rounded hover:border-orange-500/50 cursor-pointer transition-all';
            card.innerHTML = `
                <div class="flex justify-between text-[10px] font-bold mb-1">
                    <span class="text-orange-400">${s.id}</span>
                    <span class="text-[8px] text-gray-600 uppercase">${s.status}</span>
                </div>
                <div class="text-[10px] text-gray-300 font-bold">${s.name}</div>
            `;
            card.onclick = () => map.flyTo(s.start, 5);
            feed.appendChild(card);

            // Add Marker to Map
            L.circleMarker(s.start, {
                radius: 4,
                fillColor: "#ff8800",
                color: "#000",
                weight: 1,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map).bindPopup(`<b style="color:#000">${s.name} Origin</b>`);

            // Add Route Polyline
            L.polyline([s.start, s.end], {
                color: '#3b82f6',
                weight: 1,
                dashArray: '5, 10',
                opacity: 0.4
            }).addTo(map);
        });

        // 4. Map Control Logic
        function flyToHub(type) {
            if(type === 'US') map.flyTo([39.8, -98.5], 4);
            else map.flyTo([20, 0], 2);
        }

        // 5. Intelligence Layer (Typewriter Effect)
        const messages = [
            "Syncing global trade routes with SPY technicals...",
            "Analyzing bottleneck at Panama Canal Node...",
            "Predictive maintenance loop: 100% uptime confirmed.",
            "Synthesizing high-yield dividend payouts for Q2."
        ];
        let i = 0;
        setInterval(() => {
            document.getElementById('typewriter').innerText = messages[i % messages.length];
            i++;
        }, 6000);
    </script>
</body>
</html>
