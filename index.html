<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HY Analysts Terminal | Integrated Stack</title>
    
    <!-- Dependencies: Leaflet for Maps, Chart.js for Macro Data, Tailwind for UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { --terminal-black: #050505; --tv-green: #22ab94; --tv-red: #f23645; }
        body { 
            background: var(--terminal-black); 
            color: #e5e5e5; 
            font-family: 'JetBrains Mono', monospace; 
            margin: 0; 
            overflow: hidden; 
        }
        #map { height: 100vh; width: 100vw; z-index: 0; }
        
        /* UI Overlays */
        .glass-panel { 
            background: rgba(10, 10, 10, 0.85); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(8px); 
            border-radius: 4px;
        }

        .search-container {
            position: absolute; top: 20px; left: 20px; z-index: 1000; width: 320px;
        }
        
        #ticker-search {
            width: 100%; padding: 12px; background: rgba(20, 20, 20, 0.9);
            border: 1px solid #333; color: var(--tv-green); outline: none; font-size: 12px;
        }

        #suggestions {
            background: #0a0a0a; border: 1px solid #333; max-height: 250px; 
            overflow-y: auto; display: none; margin-top: 2px;
        }

        .suggestion-item {
            padding: 10px; border-bottom: 1px solid #222; cursor: pointer; font-size: 11px;
        }
        .suggestion-item:hover { background: #1a1a1a; }

        .macro-corridor {
            position: absolute; bottom: 20px; right: 20px; z-index: 1000;
            width: 360px; padding: 15px; max-height: 80vh; overflow-y: auto;
        }

        .leaflet-tooltip-own {
            background: #000 !important; border: 1px solid #333 !important;
            color: #fff !important; font-family: 'JetBrains Mono' !important; font-size: 10px !important;
        }

        /* Scrollbar for Macro Panel */
        .macro-corridor::-webkit-scrollbar { width: 4px; }
        .macro-corridor::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>

    <!-- Search Overlay -->
    <div class="search-container">
        <input type="text" id="ticker-search" placeholder="SEARCH TICKERS / COMMANDS..." autocomplete="off">
        <div id="suggestions" class="glass-panel"></div>
    </div>

    <!-- Map Canvas -->
    <div id="map"></div>

    <!-- Macro Corridor Panel -->
    <div class="macro-corridor glass-panel">
        <h2 class="text-[10px] font-bold text-gray-500 mb-4 tracking-[0.2em] border-b border-white/10 pb-2">MACRO CORRIDOR (2026.Q2)</h2>
        <div class="space-y-6">
            <div>
                <p class="text-[9px] text-orange-400 mb-1">US 2Y TREASURY YIELD</p>
                <canvas id="chart2Y"></canvas>
            </div>
            <div>
                <p class="text-[9px] text-red-500 mb-1">US 10Y TREASURY YIELD</p>
                <canvas id="chart10Y"></canvas>
            </div>
            <div>
                <p class="text-[9px] text-blue-400 mb-1">US UNEMPLOYMENT RATE (%)</p>
                <canvas id="chartUnemployment"></canvas>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CORE MAP SETUP ---
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([30, -20], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const hqLayer = L.layerGroup().addTo(map);
        const maritimeLayer = L.layerGroup().addTo(map);

        // --- 2. ASSET DATA ---
        // Integrated the extended list requested
        const assets = [
            { id: 'MPC', n: 'Marathon Petroleum', c: [41.04, -83.65], color: '#f59e0b' },
            { id: 'AAPL', n: 'Apple', c: [37.33, -122.03], color: '#e5e7eb' },
            { id: 'NVDA', n: 'NVIDIA', c: [37.37, -121.97], color: '#22ab94' },
            { id: 'XOM', n: 'ExxonMobil', c: [32.89, -96.94], color: '#ef4444' },
            { id: 'TSLA', n: 'Tesla', c: [30.22, -97.61], color: '#cc0000' },
            { id: 'F', n: 'Ford Motor', c: [42.31, -83.21], color: '#003478' },
            { id: 'GM', n: 'General Motors', c: [42.32, -83.04], color: '#22559e' },
            { id: 'PLTR', n: 'Palantir', c: [39.73, -104.99], color: '#3b82f6' }
            const assets = [
    // ... (include previous 16 here)
    { id: 'META', n: 'Meta Platforms', c: [37.48, -122.14], emp: '67k', rev: '$134B', earn: [32, 34, 39, 42], cash: '$61B', color: '#0668E1' },
    { id: 'V', n: 'Visa', c: [37.78, -122.39], emp: '28k', rev: '$32B', earn: [18, 19, 20, 22], cash: '$16B', color: '#1a1f71' },
    { id: 'MA', n: 'Mastercard', c: [41.04, -73.71], emp: '29k', rev: '$25B', earn: [12, 13, 14, 15], cash: '$10B', color: '#eb001b' },
    { id: 'PG', n: 'Procter & Gamble', c: [39.10, -84.51], emp: '107k', rev: '$82B', earn: [18, 19, 18, 20], cash: '$9B', color: '#003da5' },
    { id: 'HD', n: 'Home Depot', c: [33.86, -84.48], emp: '475k', rev: '$152B', earn: [42, 45, 40, 44], cash: '$3.7B', color: '#f96302' },
    { id: 'UNH', n: 'UnitedHealth', c: [44.91, -93.44], emp: '440k', rev: '$371B', earn: [68, 70, 72, 75], cash: '$28B', color: '#002677' },
    { id: 'BAC', n: 'Bank of America', c: [35.22, -80.84], emp: '213k', rev: '$98B', earn: [28, 30, 27, 31], cash: '$800B', color: '#012169' },
    { id: 'KO', n: 'Coca-Cola', c: [33.77, -84.39], emp: '82k', rev: '$45B', earn: [10, 11, 10, 12], cash: '$13B', color: '#f40009' },
    { id: 'PEP', n: 'PepsiCo', c: [41.04, -73.69], emp: '318k', rev: '$91B', earn: [20, 22, 21, 23], cash: '$10B', color: '#004b93' },
    { id: 'AVGO', n: 'Broadcom', c: [37.44, -122.14], emp: '20k', rev: '$35B', earn: [14, 15, 17, 19], cash: '$12B', color: '#cc0000' },
    { id: 'ABBV', n: 'AbbVie', c: [42.32, -87.84], emp: '50k', rev: '$54B', earn: [14, 15, 16, 17], cash: '$13B', color: '#002d62' },
    { id: 'TMO', n: 'Thermo Fisher', c: [42.37, -71.23], emp: '122k', rev: '$42B', earn: [10, 11, 11, 12], cash: '$8B', color: '#e41d36' },
    { id: 'CAT', n: 'Caterpillar', c: [32.81, -96.94], emp: '109k', rev: '$67B', earn: [15, 18, 17, 20], cash: '$7B', color: '#ffcd00' },
    { id: 'GE', n: 'General Electric', c: [42.36, -71.05], emp: '125k', rev: '$68B', earn: [12, 14, 13, 16], cash: '$21B', color: '#005da4' },
    { id: 'BA', n: 'Boeing', c: [38.86, -77.05], emp: '170k', rev: '$77B', earn: [16, 18, 17, 19], cash: '$12B', color: '#0039a6' },
    { id: 'F', n: 'Ford Motor', c: [42.31, -83.21], emp: '177k', rev: '$176B', earn: [41, 44, 43, 46], cash: '$24B', color: '#003478' },
    { id: 'GM', n: 'General Motors', c: [42.32, -83.04], emp: '163k', rev: '$171B', earn: [40, 42, 41, 44], cash: '$18B', color: '#22559e' },
    { id: 'RTX', n: 'Raytheon Tech', c: [38.88, -77.06], emp: '185k', rev: '$68B', earn: [15, 17, 16, 18], cash: '$6B', color: '#e01933' },
    { id: 'DIS', n: 'Disney', c: [34.15, -118.34], emp: '225k', rev: '$88B', earn: [22, 24, 21, 26], cash: '$14B', color: '#002147' },
    { id: 'NFLX', n: 'Netflix', c: [37.23, -121.96], emp: '13k', rev: '$33B', earn: [8, 9, 10, 12], cash: '$7B', color: '#e50914' }
   
];    

        const vesselClasses = {
            'TANKER': { color: '#f97316', icon: 'M12 2L22 20L12 17L2 20L12 2Z', cargo: ['Crude Oil', 'LNG'] },
            'BULK': { color: '#eab308', icon: 'M3 3h18v18H3V3z', cargo: ['Lithium', 'Copper'] },
            'CONTAINER': { color: '#3b82f6', icon: 'M4 6h16v12H4z', cargo: ['Electronics', 'Auto Parts'] }
        };

        // --- 3. SEARCH & AUTO-COMPLETE ---
        const searchInput = document.getElementById('ticker-search');
        const suggestionsBox = document.getElementById('suggestions');

        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.toUpperCase();
            suggestionsBox.innerHTML = '';
            if (!val) { suggestionsBox.style.display = 'none'; return; }

            const matches = assets.filter(a => a.id.includes(val) || a.n.toUpperCase().includes(val));
            
            if (matches.length > 0) {
                suggestionsBox.style.display = 'block';
                matches.forEach(match => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.innerHTML = `<span style="color:${match.color}; font-weight:bold;">${match.id}</span> <span class="text-gray-500">|</span> ${match.n}`;
                    div.onclick = () => {
                        map.flyTo(match.c, 7);
                        searchInput.value = match.id;
                        suggestionsBox.style.display = 'none';
                    };
                    suggestionsBox.appendChild(div);
                });
            } else {
                suggestionsBox.style.display = 'none';
            }
        });

        // --- 4. MARITIME SIMULATION ---
        let activeVessels = {};

        function getVesselIcon(heading, typeInfo) {
            return L.divIcon({
                className: 'vessel-icon',
                html: `<svg style="transform: rotate(${heading}deg); width: 14px; height: 14px;" viewBox="0 0 24 24" fill="${typeInfo.color}80" stroke="${typeInfo.color}" stroke-width="1.5"><path d="${typeInfo.icon}"/></svg>`,
                iconSize: [14, 14], iconAnchor: [7, 7]
            });
        }

        function updateVessel(mmsi, lat, lon, heading, vClass) {
            const typeInfo = vesselClasses[vClass];
            if (activeVessels[mmsi] && activeVessels[mmsi].marker) {
                activeVessels[mmsi].marker.setLatLng([lat, lon]);
                activeVessels[mmsi].marker.setIcon(getVesselIcon(heading, typeInfo));
            } else {
                const marker = L.marker([lat, lon], { icon: getVesselIcon(heading, typeInfo) }).addTo(maritimeLayer);
                marker.bindTooltip(`<strong>${vClass} CLASS</strong>`, { direction: 'top', className: 'leaflet-tooltip-own' });
                activeVessels[mmsi] = { marker };
            }
        }

        function startSimulation() {
            const routes = [
                { lat: 25, lon: -90, head: 110, class: 'TANKER' },
                { lat: 35, lon: 130, head: 250, class: 'CONTAINER' },
                { lat: -15, lon: -75, head: 330, class: 'BULK' }
            ];

            routes.forEach((r, i) => {
                for(let j=0; j<5; j++) {
                    let mmsi = `V_${i}_${j}`;
                    let v = { 
                        lat: r.lat + (Math.random()*10), 
                        lon: r.lon + (Math.random()*10), 
                        head: r.head, 
                        class: r.class, 
                        speed: 0.02 + Math.random()*0.02 
                    };
                    activeVessels[mmsi] = v;
                    updateVessel(mmsi, v.lat, v.lon, v.head, v.class);
                }
            });

            setInterval(() => {
                for(let m in activeVessels) {
                    let v = activeVessels[m];
                    if(!v.speed) continue;
                    let rad = (v.head - 90) * (Math.PI / 180);
                    v.lat += Math.sin(rad) * v.speed;
                    v.lon += Math.cos(rad) * v.speed;
                    updateVessel(m, v.lat, v.lon, v.head, v.class);
                }
            }, 1000);
        }

        // --- 5. MACRO CHARTS (DATED AXIS) ---
        function initCharts() {
            const labels = ['Jan 26', 'Feb 26', 'Mar 26', 'Apr 26', 'May 26'];
            const cfg = (color) => ({
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    x: { ticks: { color: '#555', font: { size: 9 } }, grid: { display: false } },
                    y: { ticks: { color: '#555', font: { size: 9 } }, grid: { color: '#1a1a1a' } }
                }
            });

            new Chart(document.getElementById('chart2Y'), {
                type: 'line',
                data: { labels, datasets: [{ data: [4.1, 4.3, 4.2, 4.5, 4.4], borderColor: '#f59e0b', tension: 0.4, pointRadius: 0 }] },
                options: cfg()
            });

            new Chart(document.getElementById('chart10Y'), {
                type: 'line',
                data: { labels, datasets: [{ data: [3.9, 4.0, 4.2, 4.1, 4.0], borderColor: '#ef4444', tension: 0.4, pointRadius: 0 }] },
                options: cfg()
            });

            new Chart(document.getElementById('chartUnemployment'), {
                type: 'bar',
                data: { labels, datasets: [{ data: [3.7, 3.8, 3.8, 3.9, 4.0], backgroundColor: '#3b82f6' }] },
                options: cfg()
            });
        }

        // --- 6. INITIALIZATION ---
        window.onload = () => {
            assets.forEach(e => {
                L.circleMarker(e.c, { radius: 5, color: '#fff', weight: 1, fillColor: e.color, fillOpacity: 0.8 })
                 .addTo(hqLayer)
                 .bindTooltip(`<strong>${e.n} HQ</strong>`, { direction: 'top', className: 'leaflet-tooltip-own' });
            });
            startSimulation();
            initCharts();
        };
    </script>
</body>
</html>
