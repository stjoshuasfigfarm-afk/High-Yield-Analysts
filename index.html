<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYA | Terminal 7928</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --terminal-black: #050505; --hq-orange: #ff8800; }
        body { background: var(--terminal-black); color: #e5e5e5; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .glass-card { background: rgba(10, 10, 10, 0.9); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); }
        #map { height: 100%; width: 100%; border-radius: 4px; filter: grayscale(0.2) contrast(1.1); }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .news-item { border-left: 2px solid transparent; transition: all 0.3s ease; }
        .news-item:hover { border-left: 2px solid var(--hq-orange); background: rgba(255, 136, 0, 0.05); }
    </style>
</head>
<body class="h-screen p-2 flex flex-col gap-2">

    <!-- TOP BAR: MEDIA & SYSTEM STATUS -->
    <header class="flex justify-between items-center glass-card p-3 rounded border-b border-white/5">
        <div class="flex items-center gap-6">
            <h1 class="text-sm font-bold tracking-widest text-[#ff8800]">HYA TERMINAL_7928</h1>
            <a href="https://www.youtube.com/channel/UC6MSjEFQbyoh0oOozQgGEyA" target="_blank" 
               class="flex items-center gap-2 bg-red-600/10 border border-red-600/30 px-3 py-1 rounded-full text-[9px] font-bold text-red-500 hover:bg-red-600/20 transition-all">
                <i data-lucide="youtube" class="w-3 h-3"></i> LIVE_FEED: ANALYST_CHANNEL
            </a>
        </div>
        <div class="flex items-center gap-4 text-[9px] font-bold text-gray-500">
            <span class="text-emerald-500">● SILO_SYNC_ACTIVE</span>
            <span class="border-l border-white/10 pl-4">LOC: MI_48021</span>
        </div>
    </header>

    <div class="grid grid-cols-12 gap-2 flex-grow overflow-hidden">
        
        <!-- LEFT: COMMODITY REGISTRY -->
        <aside class="col-span-3 flex flex-col gap-2 overflow-hidden">
            <div class="glass-card p-3 rounded flex-grow flex flex-col overflow-hidden">
                <h2 class="text-[10px] font-bold text-gray-400 uppercase mb-3 flex items-center justify-between">
                    Commodity HQ <i data-lucide="anchor" class="w-3 h-3 text-blue-500"></i>
                </h2>
                <div id="hq-feed" class="flex-grow overflow-y-auto custom-scroll space-y-2 pr-1">
                    <!-- JS Injected Cards -->
                </div>
            </div>
        </aside>

        <!-- CENTER: TOPOLOGY MAP -->
        <main class="col-span-6 flex flex-col gap-2">
            <div class="glass-card rounded p-1 flex-grow relative">
                <div id="map"></div>
                <div class="absolute top-4 left-4 z-[1000] glass-card p-2 rounded text-[8px] font-bold uppercase text-orange-500 border border-orange-500/20">
                    Precision Supply Chain Overlay
                </div>
            </div>
            
            <!-- METRICS BAR -->
            <div class="h-16 glass-card rounded p-2 flex justify-around items-center border-t border-emerald-500/20">
                <div class="text-center"><div class="text-[8px] text-gray-500 uppercase">SPY</div><div class="text-xs font-bold">$718.66</div></div>
                <div class="text-center"><div class="text-[8px] text-gray-500 uppercase">Yield Index</div><div class="text-xs font-bold text-emerald-400">7.2%</div></div>
                <div class="text-center"><div class="text-[8px] text-gray-500 uppercase">Silo Latency</div><div class="text-xs font-bold text-blue-400">1.2ms</div></div>
            </div>
        </main>

        <!-- RIGHT: LIVE NEWS FEED -->
        <aside class="col-span-3 flex flex-col gap-2 overflow-hidden">
            <div class="glass-card p-4 rounded flex-grow flex flex-col border-l-2 border-orange-500">
                <h2 class="text-[10px] font-bold text-orange-500 uppercase mb-4 flex items-center gap-2">
                    <i data-lucide="globe" class="w-4 h-4"></i> Global Intelligence
                </h2>
                <div id="news-feed" class="flex-grow overflow-y-auto custom-scroll space-y-4 pr-1">
                    <!-- JS Injected News -->
                </div>
            </div>
        </div>
    </aside>

    <script>
        lucide.createIcons();

        // 1. Initialize Map
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([20, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // 2. News Data
        const newsItems = [
            { time: "2m ago", title: "Panama Canal Congestion Eases", tag: "Logistics" },
            { time: "15m ago", title: "Lithium Spot Prices Stabilize in Argentina", tag: "Commodities" },
            { time: "1h ago", title: "SPY Technical Support Verified at $702", tag: "Quant" },
            { time: "2h ago", title: "Energy Sector Rotation Intensifies", tag: "Macro" },
            { time: "4h ago", title: "New AI Software Engineering Trends for Q3", tag: "Tech" }
        ];

        // 3. Commodity Data
        const commodities = [
            { id: 'CRUDE-01', name: 'WTI Crude', status: 'Priority', coords: [31.9, -102.0] },
            { id: 'LI-22', name: 'Lithium Ore', status: 'Transit', coords: [-27.3, -66.8] },
            { id: 'FE-MI', name: 'Iron Ore', status: 'Secured', coords: [-23.5, -46.6] }
        ];

        // 4. Render Feeds
        const newsFeed = document.getElementById('news-feed');
        newsFeed.innerHTML = newsItems.map(item => `
            <div class="news-item p-2 glass-card rounded cursor-pointer">
                <div class="flex justify-between text-[8px] font-bold mb-1">
                    <span class="text-orange-500 uppercase">${item.tag}</span>
                    <span class="text-gray-600">${item.time}</span>
                </div>
                <p class="text-[10px] text-gray-300 leading-snug font-bold">${item.title}</p>
            </div>
        `).join('');

        const hqFeed = document.getElementById('hq-feed');
        commodities.forEach(c => {
            const card = document.createElement('div');
            card.className = 'p-3 glass-card rounded hover:border-orange-500 transition-all cursor-pointer';
            card.innerHTML = `<div class="text-[8px] text-gray-500 font-bold">${c.id}</div><div class="text-[10px] font-bold text-gray-300">${c.name}</div>`;
            card.onclick = () => map.flyTo(c.coords, 6);
            hqFeed.appendChild(card);
            L.circleMarker(c.coords, { radius: 5, fillColor: "#ff8800", color: "#000", weight: 1, fillOpacity: 0.8 }).addTo(map);
        });
    </script>
</body>
</html>
