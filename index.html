<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HY Analysts Terminal | v7.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --terminal-black: #050505; --hq-orange: #ff8800; }
        body { background: var(--terminal-black); color: #e5e5e5; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .ticker-fixed-top { position: fixed; top: 0; left: 0; right: 0; height: 40px; z-index: 9999; background: var(--terminal-black); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .terminal-container { margin-top: 48px; height: calc(100vh - 56px); display: flex; flex-direction: column; gap: 8px; padding: 4px; }
        .glass-card { background: rgba(10, 10, 10, 0.9); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); }
        #map { height: 100%; width: 100%; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .tab-active { color: var(--hq-orange); border-bottom: 2px solid var(--hq-orange); }
        .sector-bar { height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
        .sector-fill { height: 100%; background: var(--hq-orange); transition: width 1s ease-in-out; }
    </style>
</head>
<body>

    <!-- TRADINGVIEW TICKER (SPXUSD FIX) -->
    <div class="ticker-fixed-top overflow-hidden">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            {
              "symbols": [
                { "proName": "FOREXCOM:SPXUSD", "title": "S&P 500" },
                { "proName": "NASDAQ:NVDA", "title": "NVDA" },
                { "proName": "NASDAQ:TSLA", "title": "TSLA" },
                { "proName": "NASDAQ:AAPL", "title": "AAPL" },
                { "proName": "NYMEX:CL1!", "title": "CRUDE_OIL" }
              ],
              "showSymbolLogo": false, "colorTheme": "dark", "isTransparent": true, "displayMode": "regular", "locale": "en"
            }
            </script>
        </div>
    </div>

    <div class="terminal-container">
        <header class="flex justify-between items-center glass-card p-3 rounded shrink-0">
            <div class="flex items-center gap-4">
                <h1 class="text-xs font-bold tracking-widest text-[#ff8800]">HY ANALYSTS TERMINAL</h1>
                <!-- YOUTUBE LOGO LINK -->
                <a href="https://www.youtube.com/channel/UC6MSjEFQbyoh0oOozQgGEyA" target="_blank" class="hover:opacity-80 transition-opacity">
                    <svg role="img" viewBox="0 0 24 24" fill="#FF0000" xmlns="http://www.w3.org/2000/svg" style="width:20px; height:20px;">
                        <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                    </svg>
                </a>
            </div>
            <div class="text-[8px] font-bold text-gray-500 uppercase flex gap-4">
                <span class="text-emerald-500 animate-pulse">● Global Port Network Active</span>
                <span class="border-l border-white/10 pl-4">Node: Eastpointe, MI</span>
            </div>
        </header>

        <div class="grid grid-cols-12 gap-2 flex-grow overflow-hidden">
            <!-- LEFT: SECTOR ROTATION -->
            <aside class="col-span-3 glass-card p-4 rounded flex flex-col overflow-hidden">
                <h2 class="text-[10px] font-bold text-[#ff8800] uppercase mb-4 tracking-tighter">Institutional Sector Rotation</h2>
                <div class="space-y-4 overflow-y-auto custom-scroll pr-2" id="sector-rotation-list">
                    <!-- JS Injected -->
                </div>
            </aside>

            <!-- CENTER: GLOBAL PORT TOPOLOGY -->
            <main class="col-span-6 glass-card rounded p-1 overflow-hidden">
                <div id="map"></div>
            </main>

            <!-- RIGHT: ACTIVE LOGISTICS -->
            <aside class="col-span-3 flex flex-col gap-2 overflow-hidden">
                <div class="glass-card p-4 rounded h-32 flex flex-col shrink-0">
                    <h2 class="text-[9px] font-bold text-gray-500 uppercase mb-2">Macro Feed</h2>
                    <p class="text-[10px] italic text-gray-400">Port congestion at Shanghai Node (PVG) easing by 2.4%. Energy flow to Rotterdam (RTM) steady.</p>
                </div>
                <div class="glass-card p-3 rounded flex-grow flex flex-col overflow-hidden">
                    <h3 class="text-[9px] font-bold text-gray-500 uppercase mb-3">Global Port Nodes</h3>
                    <div id="port-list" class="flex-grow overflow-y-auto custom-scroll space-y-2"></div>
                </div>
            </aside>
        </div>
    </div>

    <script>
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([20, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const sectors = [
            { name: "Technology (XLK)", strength: 94, flow: "+2.4%" },
            { name: "Energy (XLE)", strength: 62, flow: "-1.1%" },
            { name: "Financials (XLF)", strength: 81, flow: "+0.8%" },
            { name: "Healthcare (XLV)", strength: 45, flow: "-0.4%" },
            { name: "Industrials (XLI)", strength: 77, flow: "+1.2%" },
            { name: "Materials (XLB)", strength: 58, flow: "+0.2%" }
        ];

        const ports = [
            { id: 'PVG', name: 'Shanghai, CN', coords: [31.2, 121.5], type: 'Tier 1 Mega' },
            { id: 'SIN', name: 'Singapore, SG', coords: [1.3, 103.8], type: 'Bunkering Hub' },
            { id: 'RTM', name: 'Rotterdam, NL', coords: [51.9, 4.1], type: 'Energy Gateway' },
            { id: 'LAX', name: 'Long Beach, US', coords: [33.7, -118.2], type: 'Pacific Hub' },
            { id: 'DXB', name: 'Jebel Ali, AE', coords: [25.0, 55.0], type: 'Transshipment' },
            { id: 'HMB', name: 'Hamburg, DE', coords: [53.5, 9.9], type: 'EU Logistics' },
            { id: 'BSR', name: 'Santos, BR', coords: [-23.9, -46.3], type: 'Bulk Export' }
        ];

        function initSectors() {
            const list = document.getElementById('sector-rotation-list');
            list.innerHTML = sectors.map(s => `
                <div class="space-y-1">
                    <div class="flex justify-between text-[8px] font-bold uppercase">
                        <span class="text-gray-300">${s.name}</span>
                        <span class="${s.flow.includes('+') ? 'text-emerald-400' : 'text-red-400'}">${s.flow}</span>
                    </div>
                    <div class="sector-bar"><div class="sector-fill" style="width: ${s.strength}%"></div></div>
                </div>
            `).join('');
        }

        function initPorts() {
            const portList = document.getElementById('port-list');
            portList.innerHTML = ports.map(p => `
                <div class="p-2 border border-white/5 bg-white/5 rounded hover:border-[#ff8800] cursor-pointer" onclick="map.flyTo([${p.coords}], 6)">
                    <div class="flex justify-between text-[8px] font-bold text-gray-500 uppercase">
                        <span>${p.id}</span><span class="text-[#ff8800]">${p.type}</span>
                    </div>
                    <div class="text-[10px] font-bold text-gray-300 uppercase">${p.name}</div>
                </div>
            `).join('');

            ports.forEach(p => {
                L.circleMarker(p.coords, { radius: 4, color: '#ff8800', fillOpacity: 0.8 }).addTo(map)
                 .bindTooltip(`<span class="text-[10px] font-bold">${p.id}: ${p.name}</span>`, { direction: 'top' });
            });
        }

        window.onload = () => { initSectors(); initPorts(); };
    </script>
</body>
</html>
