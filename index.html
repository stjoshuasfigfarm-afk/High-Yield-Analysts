<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HY Analysts Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --terminal-black: #050505; --hq-orange: #ff8800; }
        body { background: var(--terminal-black); color: #e5e5e5; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .ticker-fixed-top { position: fixed; top: 0; left: 0; right: 0; height: 48px; z-index: 9999; background: var(--terminal-black); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .terminal-container { margin-top: 56px; height: calc(100vh - 64px); display: flex; flex-direction: column; gap: 8px; padding: 4px; }
        .glass-card { background: rgba(10, 10, 10, 0.9); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); }
        #map { height: 100%; width: 100%; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; }
        
        .bar-container { height: 8px; background: rgba(255,255,255,0.05); border-radius: 1px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--hq-orange); transition: width 0.6s ease; }
        
        .yield-point { width: 6px; height: 6px; border-radius: 50%; position: absolute; transform: translate(-3px, 3px); }
        .yield-line { height: 1px; background: rgba(255, 255, 255, 0.1); position: absolute; width: 100%; top: 50%; }
        .yield-curve-svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; }

        /* Custom Map Tooltip overriding Leaflet defaults */
        .leaflet-tooltip.terminal-tooltip { background: rgba(10, 10, 10, 0.95); border: 1px solid var(--hq-orange); color: #e5e5e5; font-family: 'JetBrains Mono', monospace; border-radius: 4px; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        .leaflet-tooltip-top.terminal-tooltip:before { border-top-color: var(--hq-orange); }
    </style>
</head>
<body>

    <div class="ticker-fixed-top">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            {
              "symbols": [
                { "proName": "FOREXCOM:SPXUSD", "title": "S&P 500" },
                { "proName": "NYMEX:CL1!", "title": "CRUDE OIL" },
                { "proName": "NASDAQ:PLTR", "title": "PLTR" },
                { "proName": "NASDAQ:GOOGL", "title": "GOOGL" },
                { "proName": "NYSE:HD", "title": "HD" },
                { "proName": "NYSE:BRK.B", "title": "BRK.B" },
                { "proName": "NASDAQ:MSFT", "title": "MSFT" },
                { "proName": "NASDAQ:AMZN", "title": "AMZN" }
              ],
              "colorTheme": "dark", "isTransparent": true, "displayMode": "regular", "locale": "en"
            }
            </script>
        </div>
    </div>

    <div class="terminal-container">
        <!-- HEADER -->
        <header class="flex justify-between items-center glass-card p-2 rounded shrink-0">
            <div class="flex items-center gap-4">
                <h1 class="text-xs font-bold tracking-widest text-[#ff8800]">HY Analysts Terminal</h1>
                <a href="https://www.youtube.com/channel/UC6MSjEFQbyoh0oOozQgGEyA" target="_blank">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="#FF0000"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                </a>
            </div>
            <div class="text-[8px] font-bold text-gray-500 flex gap-4 uppercase">
                <span class="text-emerald-500">● LIVE TERMINAL</span>
                <span class="text-blue-400">GEO-SPATIAL ACTIVE</span>
            </div>
        </header>

        <div class="grid grid-cols-12 gap-2 flex-grow overflow-hidden">
            
            <!-- LEFT: DYNAMIC DATA -->
            <aside class="col-span-3 flex flex-col gap-2 overflow-hidden">
                <!-- Tracked Assets List -->
                <div class="glass-card p-2 rounded flex flex-col overflow-hidden h-1/3 shrink-0">
                    <h2 class="text-[9px] font-bold text-gray-500 uppercase mb-2">Tracked Assets</h2>
                    <div id="equity-list" class="space-y-1 overflow-y-auto custom-scroll pr-1 flex-grow"></div>
                </div>
                
                <!-- Intelligence Silo -->
                <div id="intel-silo" class="glass-card p-3 rounded flex-grow flex flex-col overflow-hidden">
                    <div class="text-center my-auto text-[10px] text-gray-600 italic uppercase">Hover over an HQ on the map or select an asset to initialize data.</div>
                </div>
            </aside>

            <!-- CENTER: TOPOLOGY MAP -->
            <main class="col-span-6 glass-card rounded p-1 relative z-0">
                <div id="map"></div>
            </main>

            <!-- RIGHT: STATIC MACRO DATA -->
            <aside class="col-span-3 flex flex-col gap-2 overflow-hidden">
                <!-- Sector Rotation -->
                <div class="glass-card p-3 rounded shrink-0">
                    <h2 class="text-[9px] font-bold text-[#ff8800] uppercase mb-3">Sector Rotation (Macro)</h2>
                    <div class="space-y-2 pt-1" id="sector-bars"></div>
                </div>

                <!-- Yield Curve (2Y vs 10Y) -->
                <div class="glass-card p-3 rounded flex-grow flex flex-col">
                    <h2 class="text-[9px] font-bold text-blue-500 uppercase mb-2">Treasury Spread (2Y / 10Y)</h2>
                    <div class="relative flex-grow border-l border-b border-white/10 mx-4 mt-4 mb-4">
                        <div class="yield-line"></div>
                        <!-- SVG for the 2Y/10Y line -->
                        <svg class="yield-curve-svg" preserveAspectRatio="none" viewBox="0 0 100 100">
                            <path id="yield-svg-path" d="" fill="none" stroke="rgba(59, 130, 246, 0.8)" stroke-width="2" stroke-dasharray="4 2" />
                        </svg>
                        <div id="yield-curve-points" class="absolute inset-0"></div>
                    </div>
                    <div class="flex justify-between text-[8px] font-bold text-gray-400 px-2 uppercase">
                        <span>2-Year</span><span>10-Year</span>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <script>
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([38, -95], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const sAndP = [
            { id: 'AAPL', n: 'Apple', c: [37.3, -122.0], emp: '161k', empVal: 161, rev: '$383B', oil: '3.2M bbl', coms: 'Lithium, Gold', earn: [82, 94, 88, 110], cash: '$162B' },
            { id: 'MSFT', n: 'Microsoft', c: [47.6, -122.1], emp: '221k', empVal: 221, rev: '$211B', oil: 'Data Center Ops', coms: 'Silicon, Copper', earn: [52, 56, 61, 65], cash: '$143B' },
            { id: 'AMZN', n: 'Amazon', c: [47.6, -122.3], emp: '1.5M', empVal: 1500, rev: '$514B', oil: 'Heavy (Logistics)', coms: 'Fuel, Cardboard', earn: [110, 125, 135, 143], cash: '$64B' },
            { id: 'GOOGL', n: 'Alphabet', c: [37.4, -122.0], emp: '182k', empVal: 182, rev: '$307B', oil: 'High (Data Center)', coms: 'Silicon, Copper', earn: [70, 75, 82, 86], cash: '$110B' },
            { id: 'META', n: 'Meta', c: [37.4, -122.1], emp: '67k', empVal: 67, rev: '$116B', oil: 'Data Center Ops', coms: 'Silicon, Fiber', earn: [32, 35, 39, 40], cash: '$61B' },
            { id: 'NVDA', n: 'NVIDIA', c: [37.3, -121.9], emp: '29k', empVal: 29, rev: '$60B', oil: 'Data Center Load', coms: 'Silicon, Neon', earn: [40, 65, 90, 120], cash: '$25B' },
            { id: 'TSLA', n: 'Tesla', c: [30.2, -97.7], emp: '140k', empVal: 140, rev: '$96B', oil: 'Neutral', coms: 'Lithium, Nickel', earn: [30, 35, 32, 45], cash: '$26B' },
            { id: 'JPM', n: 'JPMorgan', c: [40.7, -73.9], emp: '300k', empVal: 300, rev: '$158B', oil: 'Financing Ops', coms: 'Credit, Gold', earn: [70, 75, 80, 78], cash: '$1.4T' },
            { id: 'HD', n: 'Home Depot', c: [33.8, -84.4], emp: '465k', empVal: 465, rev: '$152B', oil: 'High (Logistics)', coms: 'Lumber, Copper', earn: [38, 42, 35, 33], cash: '$3B' },
            { id: 'BRK.B', n: 'Berkshire', c: [41.2, -95.9], emp: '396k', empVal: 396, rev: '$364B', oil: 'Massive (BNSF/Energy)', coms: 'Rail, Oil, Energy', earn: [90, 85, 100, 110], cash: '$167B' },
            { id: 'PLTR', n: 'Palantir', c: [39.7, -104.9], emp: '3.8k', empVal: 3.8, rev: '$2.2B', oil: 'Low (Data Center)', coms: 'Silicon', earn: [5, 7, 9, 12], cash: '$3.7B' }
        ];

        function init() {
            // Render Static Sector Bars
            document.getElementById('sector-bars').innerHTML = [
                {n:"Technology (XLK)", v:92}, {n:"Financials (XLF)", v:78}, 
                {n:"Comm Svcs (XLC)", v:65}, {n:"Energy (XLE)", v:45}
            ].map(s => `
                <div class="text-[8px] uppercase flex justify-between mb-0.5 text-gray-300"><span>${s.n}</span><span>${s.v}%</span></div>
                <div class="bar-container mb-2"><div class="bar-fill" style="width:${s.v}%"></div></div>
            `).join('');

            // Render 2Y vs 10Y Yield Curve Data
            const yieldData = [
                { x: 0, y: 70, label: '4.8%' },  // 2Y representation
                { x: 100, y: 55, label: '4.3%' }  // 10Y representation
            ];
            
            document.getElementById('yield-curve-points').innerHTML = yieldData.map(pt => `
                <div class="yield-point bg-blue-400" style="left: ${pt.x}%; bottom: ${pt.y}%"></div>
                <div class="absolute text-[8px] text-white font-bold bg-black/50 px-1 rounded" style="left: ${pt.x}%; bottom: ${pt.y + 10}%; transform: translateX(-50%);">${pt.label}</div>
            `).join('');

            const pathD = `M 0 ${100 - yieldData[0].y} L 100 ${100 - yieldData[1].y}`;
            document.getElementById('yield-svg-path').setAttribute('d', pathD);

            // Render Dynamic Asset List on the Left
            document.getElementById('equity-list').innerHTML = sAndP.map(e => `
                <div class="p-1.5 border border-white/5 bg-white/5 rounded hover:border-[#ff8800] cursor-pointer text-[9px] font-bold flex justify-between transition-colors" onmouseover="showIntel('${e.id}')">
                    <span class="text-orange-500">${e.id}</span>
                    <span class="text-gray-500 font-normal">${e.n}</span>
                </div>
            `).join('');

            // Plot Map Markers with Hover Tooltips
            sAndP.forEach(e => {
                const marker = L.circleMarker(e.c, { radius: 5, color: '#ff8800', weight: 2, fillOpacity: 0.5 })
                 .addTo(map)
                 .bindTooltip(`
                    <div class="text-center p-1">
                        <div class="font-bold text-[#ff8800] text-[11px] uppercase tracking-wider">${e.n}</div>
                        <div class="text-emerald-400 text-[10px] mt-1 border-t border-white/10 pt-1">Headcount: ${e.emp}</div>
                    </div>
                 `, { className: 'terminal-tooltip', direction: 'top', offset: [0, -10] })
                 .on('mouseover', function() { 
                     showIntel(e.id); // Also populates the left panel instantly on hover
                 });
            });
        }

        // Render Dynamic Intelligence Silo
        function showIntel(id) {
            const co = sAndP.find(e => e.id === id);
            
            // Calculate Employment Bar width
            const empPercent = Math.min((co.empVal / 1500) * 100, 100);
            const maxEarn = Math.max(...co.earn);

            document.getElementById('intel-silo').innerHTML = `
                <div class="flex justify-between items-end border-b border-white/10 pb-2 mb-3">
                    <h3 class="text-sm font-bold text-white uppercase tracking-wider">${co.n}</h3>
                    <span class="text-xs font-bold text-[#ff8800] bg-[#ff8800]/10 px-1.5 py-0.5 rounded">${co.id}</span>
                </div>
                
                <div class="bg-emerald-900/10 border-l-2 border-emerald-500 p-2 rounded mb-3">
                    <div class="flex justify-between text-[8px] text-emerald-400 uppercase font-bold mb-1.5">
                        <span>Global Headcount</span><span>${co.emp}</span>
                    </div>
                    <div class="h-1.5 bg-white/10 rounded overflow-hidden">
                        <div class="h-full bg-emerald-500 transition-all duration-1000 ease-out" style="width: ${empPercent}%"></div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2 mb-4">
                    <div class="bg-white/5 p-2 rounded border border-white/5">
                        <div class="text-[7px] text-gray-500 uppercase mb-0.5">Gross Revenue</div>
                        <div class="text-xs font-bold text-gray-200">${co.rev}</div>
                    </div>
                    <div class="bg-white/5 p-2 rounded border border-white/5">
                        <div class="text-[7px] text-gray-500 uppercase mb-0.5">Cash Reserve</div>
                        <div class="text-xs font-bold text-green-400">${co.cash}</div>
                    </div>
                </div>

                <div class="text-[8px] text-gray-500 uppercase mb-2 font-bold tracking-widest">Quarterly Earnings</div>
                <div class="flex items-end justify-between h-16 px-4 border-b border-white/10 mb-1 pt-2">
                    ${co.earn.map(v => `<div class="w-4 bg-blue-500/80 rounded-t-sm" style="height: ${(v/maxEarn)*100}%" title="${v}"></div>`).join('')}
                </div>
                <div class="flex justify-between text-[7px] text-gray-500 uppercase mb-4 px-1">
                    <span>Q1</span><span>Q2</span><span>Q3</span><span>Q4</span>
                </div>
                
                <div class="space-y-2 mt-auto">
                    <div class="bg-blue-900/10 border border-blue-500/20 p-2 rounded">
                        <div class="text-[8px] text-blue-400 uppercase font-bold mb-1">Energy Intensity</div>
                        <div class="text-[10px] text-blue-200">${co.oil}</div>
                    </div>
                    <div class="text-[8px] text-gray-400 uppercase bg-white/5 p-2 rounded">
                        Primary Raw Coms:<br>
                        <span class="text-white font-bold tracking-wide mt-1 block">${co.coms}</span>
                    </div>
                </div>
            `;
        }

        window.onload = init;
    </script>
</body>
</html>
