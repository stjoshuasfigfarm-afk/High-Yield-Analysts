<!-- Inside your right sidebar (aside), replace the maritime-stats div with this -->
<div class="glass-card p-3 rounded shrink-0">
    <h2 class="text-[9px] font-bold text-[#ff8800] uppercase mb-3">Maritime Command Console</h2>
    <div id="vessel-controls" class="space-y-2">
        <button onclick="toggleLayer('TANKER')" id="btn-TANKER" class="w-full text-left p-2 border border-[#f97316] bg-[#f97316]/20 rounded text-[8px] font-bold flex justify-between">
            <span>TANKERS (ENERGY)</span>
            <span id="stat-tanker">0</span>
        </button>
        <button onclick="toggleLayer('BULK')" id="btn-BULK" class="w-full text-left p-2 border border-[#10b981] bg-[#10b981]/20 rounded text-[8px] font-bold flex justify-between">
            <span>BULK (METALS/AGRI)</span>
            <span id="stat-bulk">0</span>
        </button>
        <button onclick="toggleLayer('CONTAINER')" id="btn-CONTAINER" class="w-full text-left p-2 border border-[#3b82f6] bg-[#3b82f6]/20 rounded text-[8px] font-bold flex justify-between">
            <span>CONTAINERS (RETAIL)</span>
            <span id="stat-container">0</span>
        </button>
    </div>
</div>

<script>
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([20, -20], 3);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    // Asset and Vessel definitions remain the same...
    const vesselClasses = {
        'TANKER': { color: '#f97316', icon: 'M12 2L22 20L12 17L2 20L12 2Z', layer: L.layerGroup().addTo(map) },
        'BULK': { color: '#10b981', icon: 'M3 3h18v18H3V3z', layer: L.layerGroup().addTo(map) },
        'CONTAINER': { color: '#3b82f6', icon: 'M4 6h16v12H4z', layer: L.layerGroup().addTo(map) }
    };

    let activeVessels = {};
    let visibleLayers = { TANKER: true, BULK: true, CONTAINER: true };

    // --- BUTTON TOGGLE LOGIC ---
    function toggleLayer(vClass) {
        const layer = vesselClasses[vClass].layer;
        const btn = document.getElementById(`btn-${vClass}`);
        
        if (map.hasLayer(layer)) {
            map.removeLayer(layer);
            btn.style.opacity = "0.3";
            visibleLayers[vClass] = false;
        } else {
            map.addLayer(layer);
            btn.style.opacity = "1";
            visibleLayers[vClass] = true;
        }
    }

    // --- UPDATED AIS ENGINE ---
    function updateVessel(mmsi, lat, lon, heading, vClass) {
        const typeInfo = vesselClasses[vClass];
        
        if (activeVessels[mmsi] && activeVessels[mmsi].marker) {
            activeVessels[mmsi].marker.setLatLng([lat, lon]);
            activeVessels[mmsi].marker.setIcon(getVesselIcon(heading, typeInfo));
        } else {
            const marker = L.marker([lat, lon], { 
                icon: getVesselIcon(heading, typeInfo) 
            }).addTo(typeInfo.layer); // ADDS TO SPECIFIC CLASS LAYER
            
            activeVessels[mmsi] = { marker, vClass };
        }
    }

    // Include your simulation and init functions here...
    function startMaritimeSimulation() {
        const corridors = [
            { lat: 25, lon: -90, head: 120, class: 'TANKER' },
            { lat: -25, lon: -70, head: 330, class: 'BULK' },
            { lat: 10, lon: 110, head: 45, class: 'CONTAINER' }
        ];

        corridors.forEach((c, i) => {
            for(let j=0; j<12; j++) {
                let mmsi = `VESSEL_${i}_${j}`;
                let lat = c.lat + (Math.random() * 10 - 5);
                let lon = c.lon + (Math.random() * 10 - 5);
                activeVessels[mmsi] = { lat, lon, head: c.head, class: c.class, speed: 0.02 + Math.random()*0.03 };
                updateVessel(mmsi, lat, lon, c.head, c.class);
            }
        });

        setInterval(() => {
            let stats = { TANKER: 0, BULK: 0, CONTAINER: 0 };
            for(let id in activeVessels) {
                let v = activeVessels[id];
                let rad = (v.head - 90) * (Math.PI / 180);
                v.lat += Math.sin(rad) * v.speed;
                v.lon += Math.cos(rad) * v.speed;
                updateVessel(id, v.lat, v.lon, v.head, v.class);
                stats[v.class]++;
            }
            document.getElementById('stat-tanker').innerText = stats.TANKER;
            document.getElementById('stat-bulk').innerText = stats.BULK;
            document.getElementById('stat-container').innerText = stats.CONTAINER;
        }, 1000);
    }
</script>
