<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HY Analysts Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --terminal-black: #050505; --hq-orange: #ff8800; }
        body { background: var(--terminal-black); color: #e5e5e5; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .ticker-fixed-top { position: fixed; top: 0; left: 0; right: 0; height: 48px; z-index: 9999; background: var(--terminal-black); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .terminal-container { margin-top: 56px; height: calc(100vh - 64px); display: flex; flex-direction: column; gap: 8px; padding: 4px; }
        .glass-card { background: rgba(10, 10, 10, 0.9); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); }
        #map { height: 100%; width: 100%; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; }
        
        .bar-container { height: 8px; background: rgba(255,255,255,0.05); border-radius: 1px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--hq-orange); transition: width 0.6s ease; }
        
        .macro-chart-container { height: 80px; position: relative; margin-top: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .macro-stat-card { border-left: 2px solid rgba(255,255,255,0.1); padding-left: 8px; }

        .leaflet-tooltip-own {
            background: rgba(0, 0, 0, 0.9) !important;
            border: 1px solid #ff8800 !important;
            color: #fff !important;
            font-family: 'JetBrains Mono', monospace !important;
            font-size: 9px !important;
            padding: 2px 6px !important;
        }
    </style>
</head>
<body>

    <div class="ticker-fixed-top">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            {
              "symbols": [
                { "proName": "FOREXCOM:SPXUSD", "title": "S&P 500" },
                { "proName": "NASDAQ:NVDA", "title": "NVDA" },
                { "proName": "NASDAQ:AVGO", "title": "AVGO" },
                { "proName": "NASDAQ:COST", "title": "COST" },
                { "proName": "NYSE:LLY", "title": "LLY" },
                { "proName": "BITSTAMP:BTCUSD", "title": "BTC/USD" },
                { "proName": "NASDAQ:PLTR", "title": "PLTR" },
                { "proName": "NASDAQ:GOOGL", "title": "GOOGL" },
                { "proName": "NYSE:BRK.B", "title": "BRK.B" }
              ],
              "colorTheme": "dark", "isTransparent": true, "displayMode": "regular", "locale": "en"
            }
            </script>
        </div>
    </div>

    <div class="terminal-container">
        <header class="flex justify-between items-center glass-card p-2 rounded shrink-0">
            <div class="flex items-center gap-4">
                <h1 class="text-xs font-bold tracking-widest text-[#ff8800]">HY Analysts Terminal</h1>
                <a href="https://www.youtube.com/channel/UC6MSjEFQbyoh0oOozQgGEyA" target="_blank">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="#FF0000"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                </a>
            </div>
            <div class="text-[8px] font-bold text-gray-500 flex gap-4 uppercase">
                <span class="text-emerald-500">● LIVE TERMINAL</span>
                <span class="text-blue-400">MACRO OVERLAY ACTIVE</span>
            </div>
        </header>

        <div class="grid grid-cols-12 gap-2 flex-grow overflow-hidden">
            
            <!-- LEFT: COMPANY & ASSETS -->
            <aside class="col-span-3 flex flex-col gap-2 overflow-hidden">
                <div class="glass-card p-2 rounded flex flex-col overflow-hidden h-1/4 shrink-0">
                    <h2 class="text-[9px] font-bold text-gray-500 uppercase mb-2">Tracked Assets</h2>
                    <div id="equity-list" class="space-y-1 overflow-y-auto custom-scroll pr-1 flex-grow"></div>
                </div>
                
                <div id="intel-silo" class="glass-card p-3 rounded flex-grow flex flex-col overflow-hidden">
                    <h2 class="text-[9px] font-bold text-[#ff8800] uppercase mb-3 tracking-widest border-b border-white/10 pb-1">Company</h2>
                    <div id="company-content" class="overflow-y-auto custom-scroll flex-grow pr-1">
                        <div class="text-center my-auto pt-20 text-[10px] text-gray-600 italic uppercase">Hover for workforce. Click for financials.</div>
                    </div>
                </div>
            </aside>

            <!-- CENTER: MAP -->
            <main class="col-span-6 glass-card rounded p-1 relative z-0">
                <div id="map"></div>
            </main>

            <!-- RIGHT: MACRO CHARTS -->
            <aside class="col-span-3 flex flex-col gap-2 overflow-hidden overflow-y-auto custom-scroll pr-1">
                <div class="glass-card p-3 rounded shrink-0">
                    <h2 class="text-[9px] font-bold text-[#ff8800] uppercase mb-3">Sector Rotation (Macro)</h2>
                    <div class="space-y-2 pt-1" id="sector-bars"></div>
                </div>

                <!-- Yield Curve -->
                <div class="glass-card p-3 rounded shrink-0">
                    <h2 class="text-[9px] font-bold text-blue-500 uppercase flex justify-between">
                        <span>Treasury Yields (12M)</span>
                        <span class="text-[7px] text-gray-500">10Y <span class="text-white/40">──</span> 2Y <span class="text-blue-400">──</span></span>
                    </h2>
                    <div class="macro-chart-container">
                        <svg class="absolute inset-0 w-full h-full" viewBox="0 0 100 40" preserveAspectRatio="none">
                            <path d="M0,20 Q25,15 50,25 T100,18" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
                            <path d="M0,25 Q25,28 50,15 T100,10" fill="none" stroke="#3b82f6" stroke-width="1.5" />
                        </svg>
                    </div>
                </div>

                <!-- Interest Rates (Fed Funds) -->
                <div class="glass-card p-3 rounded shrink-0">
                    <h2 class="text-[9px] font-bold text-red-500 uppercase flex justify-between">
                        <span>Fed Funds Rate</span>
                        <span class="text-[7px] text-gray-500">Current: 5.33%</span>
                    </h2>
                    <div class="macro-chart-container">
                        <svg class="absolute inset-0 w-full h-full" viewBox="0 0 100 40" preserveAspectRatio="none">
                            <path d="M0,35 L20,35 L40,25 L60,10 L80,10 L100,10" fill="none" stroke="#ef4444" stroke-width="1.5" />
                        </svg>
                    </div>
                </div>

                <!-- Employment Data (Macro Trend) -->
                <div class="glass-card p-3 rounded shrink-0">
                    <h2 class="text-[9px] font-bold text-emerald-500 uppercase flex justify-between">
                        <span>Employment Trend</span>
                        <span class="text-[7px] text-gray-500">Non-Farm Payrolls</span>
                    </h2>
                    <div class="macro-chart-container">
                        <svg class="absolute inset-0 w-full h-full" viewBox="0 0 100 40" preserveAspectRatio="none">
                            <path d="M0,30 L10,28 L20,25 L30,22 L40,24 L50,20 L60,18 L70,19 L80,15 L90,12 L100,10" fill="none" stroke="#10b981" stroke-width="1.5" />
                        </svg>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <script>
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([38, -95], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const sAndP = [
            { id: 'AAPL', n: 'Apple', c: [37.33, -122.03], emp: '161k', empVal: 161, rev: '$383B', oil: '3.2M bbl', coms: 'Lithium, Gold', earn: [82, 94, 88, 110], cash: '$162B' },
            { id: 'NVDA', n: 'NVIDIA', c: [37.37, -121.97], emp: '29k', empVal: 29, rev: '$60.9B', oil: 'Hyper-Scale (GPU)', coms: 'Silicon, Neon', earn: [12, 18, 25, 32], cash: '$25.9B' },
            { id: 'MSFT', n: 'Microsoft', c: [47.67, -122.12], emp: '221k', empVal: 221, rev: '$211B', oil: 'Data Center Ops', coms: 'Silicon, Copper', earn: [52, 56, 61, 65], cash: '$143B' },
            { id: 'AMZN', n: 'Amazon', c: [47.60, -122.33], emp: '1.5M', empVal: 1500, rev: '$514B', oil: 'Heavy (Logistics)', coms: 'Fuel, Cardboard', earn: [110, 125, 135, 143], cash: '$64B' },
            { id: 'GOOGL', n: 'Alphabet', c: [37.42, -122.08], emp: '182k', empVal: 182, rev: '$307B', oil: 'High (Data Center)', coms: 'Silicon, Copper', earn: [70, 75, 82, 86], cash: '$110B' },
            { id: 'TSLA', n: 'Tesla', c: [30.26, -97.74], emp: '140k', empVal: 140, rev: '$96B', oil: 'Neutral', coms: 'Lithium, Nickel', earn: [30, 35, 32, 45], cash: '$26B' },
            { id: 'BRK.B', n: 'Berkshire', c: [41.25, -95.93], emp: '396k', empVal: 396, rev: '$364B', oil: 'Massive (BNSF/Energy)', coms: 'Rail, Oil, Energy', earn: [90, 85, 100, 110], cash: '$167B' },
            { id: 'LLY', n: 'Eli Lilly', c: [39.76, -86.15], emp: '43k', empVal: 43, rev: '$34B', oil: 'Chemical Ops', coms: 'Reagents', earn: [8, 9, 10, 12], cash: '$3B' },
            { id: 'AVGO', n: 'Broadcom', c: [37.37, -121.92], emp: '20k', empVal: 20, rev: '$35B', oil: 'Data Center', coms: 'Silicon', earn: [7, 8, 9, 11], cash: '$12B' }
        ];

        function init() {
            document.getElementById('sector-bars').innerHTML = [
                {n:"Technology (XLK)", v:94}, {n:"Health Care (XLV)", v:82}, 
                {n:"Financials (XLF)", v:76}, {n:"Comm Svcs (XLC)", v:68}
            ].map(s => `
                <div class="text-[8px] uppercase flex justify-between mb-0.5 text-gray-300"><span>${s.n}</span><span>${s.v}%</span></div>
                <div class="bar-container mb-2"><div class="bar-fill" style="width:${s.v}%"></div></div>
            `).join('');

            document.getElementById('equity-list').innerHTML = sAndP.map(e => `
                <div class="p-1.5 border border-white/5 bg-white/5 rounded hover:border-[#ff8800] cursor-pointer text-[9px] font-bold flex justify-between transition-colors" onclick="selectCompany('${e.id}')">
                    <span class="text-orange-500">${e.id}</span>
                    <span class="text-gray-500 font-normal">${e.n}</span>
                </div>
            `).join('');

            sAndP.forEach(e => {
                const marker = L.circleMarker(e.c, { radius: 6, color: '#ff8800', weight: 2, fillOpacity: 0.5 }).addTo(map);
                marker.bindTooltip(`Workforce: ${e.emp}`, { direction: 'top', className: 'leaflet-tooltip-own', offset: [0, -5] });
                marker.on('click', () => selectCompany(e.id));
            });
        }

        function selectCompany(id) {
            const co = sAndP.find(e => e.id === id);
            map.flyTo(co.c, 12, { animate: true, duration: 4.0 });
            
            const empPercent = Math.min((co.empVal / 1500) * 100, 100);
            const maxEarn = Math.max(...co.earn);

            document.getElementById('company-content').innerHTML = `
                <div class="mb-4">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-lg font-bold text-white">${co.n}</span>
                        <span class="text-xs font-bold text-[#ff8800] bg-[#ff8800]/10 px-2 py-1 rounded">${co.id}</span>
                    </div>

                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <div class="bg-white/5 p-2 rounded border border-white/5">
                            <div class="text-[7px] text-gray-500 uppercase mb-0.5">Gross Revenue</div>
                            <div class="text-xs font-bold text-gray-200">${co.rev}</div>
                        </div>
                        <div class="bg-white/5 p-2 rounded border border-white/5">
                            <div class="text-[7px] text-gray-500 uppercase mb-0.5">Cash Position</div>
                            <div class="text-xs font-bold text-green-400">${co.cash}</div>
                        </div>
                    </div>

                    <div class="text-[8px] text-gray-400 uppercase mb-1 font-bold tracking-widest">Revenue Momentum</div>
                    <div class="flex items-end justify-between h-12 px-2 border-b border-white/10 mb-1 pt-2">
                        ${co.earn.map(v => `<div class="w-3 bg-blue-500/60 rounded-t-sm" style="height: ${(v/maxEarn)*100}%"></div>`).join('')}
                    </div>
                    <div class="flex justify-between text-[6px] text-gray-500 uppercase mb-6">
                        <span>Q1</span><span>Q2</span><span>Q3</span><span>Q4</span>
                    </div>

                    <h3 class="text-[8px] font-bold text-emerald-500 uppercase mb-3 italic tracking-tighter">Labor & Payroll Data</h3>
                    <div class="space-y-3">
                        <div class="bg-emerald-900/10 border-l-2 border-emerald-500 p-2 rounded">
                            <div class="flex justify-between text-[7px] text-emerald-400 uppercase font-bold mb-1">
                                <span>Total Workforce</span><span>${co.emp}</span>
                            </div>
                            <div class="h-1 bg-white/10 rounded overflow-hidden">
                                <div class="h-full bg-emerald-500" style="width: ${empPercent}%"></div>
                            </div>
                        </div>
                        <div class="macro-stat-card border-red-900/50">
                            <div class="text-[7px] text-gray-500 uppercase">Sector Layoffs (30D)</div>
                            <div class="text-xs font-bold text-red-400">12,482 <span class="text-[7px] text-gray-400 ml-1">Aggregate</span></div>
                        </div>
                    </div>

                    <div class="space-y-2 mt-6">
                        <div class="bg-blue-900/10 border border-blue-500/20 p-2 rounded">
                            <div class="text-[8px] text-blue-400 uppercase font-bold mb-1">Infrastructure Load</div>
                            <div class="text-[9px] text-blue-200">${co.oil}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        window.onload = init;
    </script>
</body>
</html>
