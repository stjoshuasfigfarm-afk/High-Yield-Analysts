<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYA | Terminal 7928</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --terminal-black: #050505; --hq-orange: #ff8800; }
        body { background: var(--terminal-black); color: #e5e5e5; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .glass-card { background: rgba(10, 10, 10, 0.9); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); }
        #map { height: 100%; width: 100%; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .tab-active { color: var(--hq-orange); border-bottom: 2px solid var(--hq-orange); }
        
        /* Headline Ticker Animation */
        .headline-container { height: 40px; overflow: hidden; position: relative; }
        .headline-item { position: absolute; width: 100%; opacity: 0; transform: translateY(20px); transition: all 0.5s ease-in-out; }
        .headline-active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="h-screen flex flex-col p-1 gap-1">

    <!-- TRADINGVIEW WIDGET (TOP BAR) -->
    <div class="h-10 w-full glass-card overflow-hidden rounded">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            {
              "symbols": [
                { "proName": "FOREXCOM:SPXUSD", "title": "S&P 500" },
                { "proName": "NASDAQ:GOOGL", "title": "Alphabet" },
                { "proName": "NASDAQ:MSFT", "title": "Microsoft" },
                { "proName": "NASDAQ:AAPL", "title": "Apple" },
                { "proName": "NASDAQ:NVDA", "title": "NVIDIA" },
                { "proName": "NYMEX:CL1!", "title": "Crude Oil" }
              ],
              "showSymbolLogo": true, "colorTheme": "dark", "isTransparent": true, "displayMode": "adaptive", "locale": "en"
            }
            </script>
        </div>
    </div>

    <!-- MAIN HEADER -->
    <header class="flex justify-between items-center glass-card p-3 rounded">
        <div class="flex items-center gap-6">
            <h1 class="text-xs font-bold tracking-widest text-[#ff8800]">HYA_TERMINAL_7928</h1>
            <a href="https://www.youtube.com/channel/UC6MSjEFQbyoh0oOozQgGEyA" target="_blank">
                <svg class="w-5 h-5 fill-red-600 hover:fill-red-500 transition-colors" viewBox="0 0 24 24">
                    <path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/>
                </svg>
            </a>
        </div>
        <div class="flex items-center gap-4 text-[8px] font-bold text-gray-500 uppercase">
            <span class="text-emerald-500">● Global_Sync_Active</span>
            <span class="border-l border-white/10 pl-4 italic">Node: Eastpointe, MI</span>
        </div>
    </header>

    <div class="grid grid-cols-12 gap-1 flex-grow overflow-hidden">
        
        <!-- LEFT: HQ & SECTOR ROTATION -->
        <aside class="col-span-3 flex flex-col gap-1 overflow-hidden">
            <div class="glass-card p-3 rounded flex-grow flex flex-col overflow-hidden">
                <div class="flex gap-4 border-b border-white/10 mb-3 text-[10px] font-bold uppercase">
                    <button onclick="switchTab('commodities')" id="tab-commodities" class="pb-1 tab-active">Commodities</button>
                    <button onclick="switchTab('stocks')" id="tab-stocks" class="pb-1 text-gray-600">Stocks</button>
                </div>
                <div id="hq-list" class="flex-grow overflow-y-auto custom-scroll space-y-2">
                    <!-- Dynamic List -->
                </div>
            </div>

            <!-- SECTOR ROTATION -->
            <div class="glass-card p-3 rounded h-32 border-t border-emerald-900/20">
                <h3 class="text-[9px] font-bold text-gray-500 uppercase italic mb-2">Institutional Weight</h3>
                <div class="space-y-3">
                    <div class="flex justify-between text-[8px] uppercase"><span>Tech (XLK)</span><span class="text-emerald-400">94%</span></div>
                    <div class="w-full bg-white/5 h-1 rounded-full"><div class="bg-emerald-500 h-full w-[94%]"></div></div>
                    <div class="flex justify-between text-[8px] uppercase"><span>Energy (XLE)</span><span class="text-orange-400">58%</span></div>
                    <div class="w-full bg-white/5 h-1 rounded-full"><div class="bg-orange-500 h-full w-[58%]"></div></div>
                </div>
            </div>
        </aside>

        <!-- CENTER: MAP -->
        <main class="col-span-6 flex flex-col">
            <div class="glass-card rounded p-1 flex-grow relative overflow-hidden">
                <div id="map"></div>
            </div>
        </main>

        <!-- RIGHT: CYCLING HEADLINE PANEL -->
        <aside class="col-span-3 flex flex-col gap-1 overflow-hidden">
            <div class="glass-card p-4 rounded flex-grow border-l-2 border-orange-500 flex flex-col">
                <h2 class="text-[10px] font-bold text-orange-500 uppercase mb-4 flex items-center gap-2">
                    <i data-lucide="rss" class="w-3 h-3"></i> Intelligence Layer
                </h2>
                <div class="headline-container" id="news-container">
                    <!-- Headlines injected here -->
                </div>
                
                <!-- STABLE CONTEXT PANEL (BELOW TICKER) -->
                <div class="mt-4 p-3 border border-white/5 bg-white/5 rounded">
                    <h4 class="text-[8px] font-bold text-gray-500 uppercase mb-2">Global Monitoring Node</h4>
                    <p class="text-[10px] text-gray-400 leading-snug">
                        Strait of Hormuz transit remains under Phase A-E surveillance. Crude volatility impacts GOOGL/MSFT data center power logic.
                    </p>
                </div>
            </div>
        </aside>
    </div>

    <script>
        lucide.createIcons();
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([20, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const data = {
            commodities: [
                { id: 'WTI', name: 'West Texas Crude', val: '$84.22', coords: [31.9, -102.0], ref: 'Permian' },
                { id: 'BRT', name: 'Brent Crude', val: '$89.10', coords: [26.0, 56.0], ref: 'Hormuz' },
                { id: 'CU', name: 'Copper Grade A', val: '$4.22', coords: [-23.4, -70.4], ref: 'Tech Infrastructure' },
                { id: 'LI', name: 'Lithium Spod.', val: '$13.4k', coords: [-27.3, -66.8], ref: 'Silo Storage' }
            ],
            stocks: [
                { id: 'SPY', name: 'S&P 500 ETF', val: '$718.66', coords: [40.7, -74.0] },
                { id: 'GOOGL', name: 'Alphabet Inc.', val: '$178.44', coords: [37.4, -122.0] },
                { id: 'MSFT', name: 'Microsoft Corp', val: '$420.12', coords: [47.6, -122.1] },
                { id: 'AAPL', name: 'Apple Inc.', val: '$189.50', coords: [37.3, -122.0] }
            ]
        };

        const headlines = [
            { tag: "GEO", msg: "Hormuz Node: Shipping volume holding at 21M bpd." },
            { tag: "TECH", msg: "GOOGL/MSFT expand AI clusters; copper demand up 12%." },
            { tag: "MACRO", msg: "SPY technical support verified at $702 range." },
            { tag: "LOGIC", msg: "Silo rehydration active; Phase E verification pending." }
        ];

        let currentHeadline = 0;
        const container = document.getElementById('news-container');

        function initNews() {
            container.innerHTML = headlines.map((h, i) => `
                <div class="headline-item ${i === 0 ? 'headline-active' : ''}" id="headline-${i}">
                    <span class="text-[8px] text-red-500 font-bold uppercase">${h.tag} ALERT</span>
                    <p class="text-[11px] text-gray-300 font-bold leading-tight mt-1">${h.msg}</p>
                </div>
            `).join('');

            setInterval(() => {
                document.getElementById(`headline-${currentHeadline}`).classList.remove('headline-active');
                currentHeadline = (currentHeadline + 1) % headlines.length;
                document.getElementById(`headline-${currentHeadline}`).classList.add('headline-active');
            }, 5000);
        }

        function switchTab(tab) {
            document.getElementById('tab-commodities').className = tab === 'commodities' ? 'pb-1 tab-active' : 'pb-1 text-gray-600';
            document.getElementById('tab-stocks').className = tab === 'stocks' ? 'pb-1 tab-active' : 'pb-1 text-gray-600';
            const list = document.getElementById('hq-list');
            list.innerHTML = data[tab].map(item => `
                <div class="p-2 border border-white/5 bg-white/10 rounded hover:border-orange-500 cursor-pointer transition-all" onclick="map.flyTo([${item.coords}], 6)">
                    <div class="flex justify-between text-[8px] font-bold text-gray-500">
                        <span>${item.id}</span><span class="text-emerald-400">${item.val}</span>
                    </div>
                    <div class="text-[10px] font-bold text-gray-300 uppercase">${item.name}</div>
                </div>
            `).join('');
        }

        switchTab('commodities');
        initNews();
    </script>
</body>
</html>
