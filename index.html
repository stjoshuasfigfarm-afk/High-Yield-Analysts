<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYA | Terminal 7928</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --terminal-black: #050505; --hq-orange: #ff8800; }
        body { background: var(--terminal-black); color: #e5e5e5; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .glass-card { background: rgba(10, 10, 10, 0.9); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); }
        #map { height: 100%; width: 100%; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .tab-active { color: var(--hq-orange); border-bottom: 2px solid var(--hq-orange); }
        .bar-anim { transition: width 0.8s ease-in-out; }
    </style>
</head>
<body class="h-screen p-2 flex flex-col gap-2">

    <!-- TOP BAR -->
    <header class="flex justify-between items-center glass-card p-3 rounded border-b border-white/5">
        <div class="flex items-center gap-6">
            <h1 class="text-sm font-bold tracking-widest text-[#ff8800]">HYA TERMINAL_7928</h1>
            <a href="https://www.youtube.com/channel/UC6MSjEFQbyoh0oOozQgGEyA" target="_blank" title="Live Analyst Channel">
                <svg class="w-6 h-6 fill-red-600 hover:fill-red-500 transition-colors" viewBox="0 0 24 24">
                    <path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/>
                </svg>
            </a>
        </div>
        <div class="flex items-center gap-4 text-[9px] font-bold text-gray-500">
            <span class="text-emerald-500 uppercase">● Phase E Verified</span>
            <span class="border-l border-white/10 pl-4 uppercase">Node: Eastpointe_MI</span>
        </div>
    </header>

    <div class="grid grid-cols-12 gap-2 flex-grow overflow-hidden">
        
        <!-- LEFT: TABBED HEADQUARTERS -->
        <aside class="col-span-3 flex flex-col gap-2 overflow-hidden">
            <div class="glass-card p-3 rounded flex-grow flex flex-col overflow-hidden">
                <div class="flex gap-4 border-b border-white/10 mb-3 text-[10px] font-bold uppercase tracking-tighter">
                    <button onclick="switchTab('commodities')" id="tab-commodities" class="pb-1 tab-active">Commodities</button>
                    <button onclick="switchTab('stocks')" id="tab-stocks" class="pb-1 text-gray-600 hover:text-white transition-colors">Stocks</button>
                </div>
                <div id="hq-list" class="flex-grow overflow-y-auto custom-scroll space-y-2 pr-1">
                    <!-- Dynamic List -->
                </div>
            </div>

            <!-- SECTOR ROTATION (RESTORED) -->
            <div class="glass-card p-3 rounded h-48 border-t border-blue-500/30">
                <h3 class="text-[9px] font-bold text-gray-500 uppercase mb-3 italic">Institutional Rotation</h3>
                <div class="space-y-3" id="rotation-grid">
                    <div class="space-y-1">
                        <div class="flex justify-between text-[8px] uppercase"><span>Technology</span><span class="text-emerald-400">92%</span></div>
                        <div class="w-full bg-white/5 h-1 rounded-full overflow-hidden"><div class="bg-emerald-500 h-full bar-anim" style="width: 92%"></div></div>
                    </div>
                    <div class="space-y-1">
                        <div class="flex justify-between text-[8px] uppercase"><span>Energy</span><span class="text-orange-400">45%</span></div>
                        <div class="w-full bg-white/5 h-1 rounded-full overflow-hidden"><div class="bg-orange-500 h-full bar-anim" style="width: 45%"></div></div>
                    </div>
                    <div class="space-y-1">
                        <div class="flex justify-between text-[8px] uppercase"><span>Financials</span><span class="text-blue-400">78%</span></div>
                        <div class="w-full bg-white/5 h-1 rounded-full overflow-hidden"><div class="bg-blue-500 h-full bar-anim" style="width: 78%"></div></div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- CENTER: MAP -->
        <main class="col-span-6 flex flex-col gap-2">
            <div class="glass-card rounded p-1 flex-grow relative overflow-hidden">
                <div id="map"></div>
                <div class="absolute bottom-4 left-4 z-[1000] p-2 glass-card rounded text-[8px] font-bold text-orange-500 uppercase tracking-widest border border-orange-500/20">
                    Silo Topology: Global Mode
                </div>
            </div>
        </main>

        <!-- RIGHT: NEWS -->
        <aside class="col-span-3 flex flex-col gap-2 overflow-hidden">
            <div class="glass-card p-4 rounded flex-grow border-l-2 border-orange-500 flex flex-col overflow-hidden">
                <h2 class="text-[10px] font-bold text-orange-500 uppercase mb-4 flex items-center gap-2">
                    <i data-lucide="rss" class="w-3 h-3"></i> Intelligence Feed
                </h2>
                <div id="news-feed" class="flex-grow overflow-y-auto custom-scroll space-y-4 pr-1">
                    <!-- News Items -->
                </div>
            </div>
        </aside>
    </div>

    <script>
        lucide.createIcons();
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([20, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const data = {
            commodities: [
                { id: 'CR-01', name: 'WTI Crude', val: '$84.22', coords: [31.9, -102.0] },
                { id: 'LI-22', name: 'Lithium Ore', val: '$13,400', coords: [-27.3, -66.8] },
                { id: 'AU-09', name: 'Gold Bulk', val: '$2,410', coords: [-31.9, 115.8] }
            ],
            stocks: [
                { id: 'SPY', name: 'S&P 500 ETF', val: '$718.66', coords: [40.7, -74.0] },
                { id: 'JEPI', name: 'JPM Equity Premium', val: '$56.40', coords: [40.7, -74.0] },
                { id: 'NVDA', name: 'NVIDIA Corp', val: '$192.01', coords: [37.3, -121.8] },
                { id: 'PLTR', name: 'Palantir Tech', val: '$65.42', coords: [37.7, -122.4] }
            ]
        };

        const news = [
            { tag: "Macro", msg: "Yield inversion stabilizes in Phase E cycle." },
            { tag: "Ship", msg: "Panama Node throughput returns to 100%." },
            { tag: "Logic", msg: "Firebase Silo rehydration parity confirmed." }
        ];

        function switchTab(tab) {
            document.getElementById('tab-commodities').className = tab === 'commodities' ? 'pb-1 tab-active' : 'pb-1 text-gray-600';
            document.getElementById('tab-stocks').className = tab === 'stocks' ? 'pb-1 tab-active' : 'pb-1 text-gray-600';
            renderList(tab);
        }

        function renderList(tab) {
            const container = document.getElementById('hq-list');
            container.innerHTML = data[tab].map(item => `
                <div class="p-2 border border-white/5 bg-white/5 rounded hover:border-orange-500 cursor-pointer transition-all" onclick="map.flyTo([${item.coords}], 6)">
                    <div class="flex justify-between text-[8px] font-bold text-gray-500 uppercase">
                        <span>${item.id}</span>
                        <span class="text-emerald-400">${item.val}</span>
                    </div>
                    <div class="text-[10px] font-bold text-gray-300 uppercase">${item.name}</div>
                </div>
            `).join('');
        }

        document.getElementById('news-feed').innerHTML = news.map(n => `
            <div class="p-2 glass-card rounded border-l border-white/10">
                <span class="text-[8px] text-orange-500 font-bold uppercase">${n.tag}</span>
                <p class="text-[10px] text-gray-400 leading-tight">${n.msg}</p>
            </div>
        `).join('');

        switchTab('commodities');
    </script>
</body>
</html>
